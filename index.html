<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Connect | Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="logo">Event Connect</a>
      <div class="header-actions">
        <nav>
          <ul class="nav-list">
            <li><a href="index.html">Login</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="profile.html">Profile</a></li>
          </ul>
        </nav>
        <button type="button" id="themeToggleButton" class="theme-btn">
          Switch To Dark Mode
        </button>
      </div>
    </header>

    <main class="page-container">
      <section class="hero-card">
        <div class="hero-text">
          <p class="small-label">Simple Event Services Website</p>
          <h1>Plan events with easy service management</h1>
          <p>
            This beginner project shows login, services, profile details, local
            storage, session storage, validation, and API data in one clean
            website.
          </p>
          <a class="button-link" href="dashboard.html">View Dashboard</a>
        </div>

        <div class="form-card">
          <h2>Login</h2>
          <form id="loginForm" novalidate>
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              placeholder="Enter username"
            />

            <label for="userRole">Login As</label>
            <select id="userRole">
              <option value="">Select a role</option>
              <option value="Event Company">Event Company</option>
              <option value="Customer">Customer</option>
            </select>

            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter password"
            />

            <p id="loginError" class="error-message"></p>
            <button type="button" id="loginButton" class="primary-btn">
              Login
            </button>
          </form>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
